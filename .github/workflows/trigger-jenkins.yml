name: Trigger Jenkins

on:
  push:
    branches:
      - main
      
jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Jenkins job
        run: |
          curl -X POST https://jenkins.geek-devops.de/job/demo-pipeline-linux/build --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
